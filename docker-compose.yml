services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "GardDemo@2026"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "GardDemo@2026" -Q "SELECT 1" -No -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: >-
        Server=db,1433;Database=GardPortal;User Id=sa;Password=GardDemo@2026;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
